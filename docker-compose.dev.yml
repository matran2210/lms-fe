version: '3'

services:
  next-app:
    container_name: next-app
    build:
      context: ./
      dockerfile: dev.Dockerfile
    # environment:
    #   ENV_VARIABLE: ${ENV_VARIABLE}
    #   NEXT_PUBLIC_ENV_VARIABLE: ${NEXT_PUBLIC_ENV_VARIABLE}
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    restart: always
    ports:
      - 3080:3000

