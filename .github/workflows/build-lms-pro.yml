name: Build lms-pro

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  APP_NAME: lms-pro
  IMAGE_NAME: 21101999/lms

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # NEXT_PUBLIC_* được nhúng vào bundle lúc build nên phải có .env TRƯỚC khi docker build.
      # Lưu toàn bộ nội dung .env prod vào secret ENV_PROD_LMS.
      - name: Create .env
        run: |
          cat > apps/${{ env.APP_NAME }}/.env <<'EOF'
          ${{ secrets.ENV_PROD_LMS }}
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: prod.Dockerfile
          build-args: |
            APP_NAME=${{ env.APP_NAME }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
