version: "3.9"

services:
  lms-zoom:
    image: ${LMS_ZOOM_IMAGE}
    container_name: lms-zoom
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    restart: always
    networks:
      - local

  nginx:
    image: nginx:latest
    depends_on:
      lms-zoom:
        condition: service_started
    container_name: nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    networks:
      - local
    volumes:
      - /var/www/vhost:/etc/nginx/conf.d
      - /var/www/cert/uat-ops-be.sapp.edu.vn.crt:/etc/nginx/uat-ops-be.sapp.edu.vn.crt
      - /var/www/cert/uat-ops-be.sapp.edu.vn.key:/etc/nginx/uat-ops-be.sapp.edu.vn.key

networks:
  local:
 