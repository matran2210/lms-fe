# New CI-CD
stages:
  - build
  - deploy

default:
  image: node:16.17.0-alpine

build_master:
  stage: build
  before_script:
    - docker info
  only:
    variables:
      - $CI_COMMIT_MESSAGE =~ /build/
    refs:
      - hotfix/gitlab-ci
  script:
    - cp $ENV_PRODUCT_FILE .env
    - docker login -u $REGISTRY_USER -p $REGISTRY_PASSWORD $REGISTRY
    - docker build -t gitlab.sapp.edu.vn:5050/lms-pro/lms-fe/lms-fe-next:$CI_PIPELINE_IID -f prod.Dockerfile .
    - docker push gitlab.sapp.edu.vn:5050/lms-pro/lms-fe/lms-fe-next:$CI_PIPELINE_IID
    - echo "IMAGE_PRODUCT_LMS_FE=gitlab.sapp.edu.vn:5050/lms-pro/lms-fe/lms-fe-next:$CI_PIPELINE_IID" > /home/gitlab-runner/image_version.txt
  environment: production
  tags:
    - exec-shell  


deploy_staging:
  stage: deploy
  only:
    - staging
  script:
    - yarn global add vercel
    - yarn install
    - vercel deploy --prod --token=$VERCEL_TOKEN
  environment: staging

deploy_master:
  stage: deploy
  before_script:
    - chmod 400 $SSH_KEY
  only:
    variables:
      - $CI_COMMIT_MESSAGE =~ /deploy/
    refs:
      - hotfix/gitlab-ci
  script:
    - source /home/gitlab-runner/image_version.txt
    - echo $IMAGE_PRODUCT_LMS_FE
    - |
      if [[ -z "$IMAGE_PRODUCT_LMS_FE" ]]; then
          echo "IMAGE_PRODUCT_LMS_FE is not available. Please ensure a previous build job exists."
          exit 1
      fi
      ssh -o StrictHostKeyChecking=no -i $SSH_KEY root@$PROD_IP "
      echo $IMAGE_PRODUCT_LMS_FE &&
      cd /var/www/lms-fe &&
      git reset --hard origin/hotfix/gitlab-ci &&
      sed -i '/^\s*next-app\s*:/,/^ *[^[:space:]]/ s@^\(\s*image\s*:\s*\)[^[:space:]]*@\1"$IMAGE_PRODUCT_LMS_FE"@' docker-compose.prod.yml &&
      docker compose -f docker-compose.prod.yml pull next-app &&
      docker compose -f docker-compose.prod.yml up -d --build"
  environment: production 
  tags:
    - exec-shell

