# Template chung cho deploy staging
.deploy_staging_template:
  stage: deploy
  image: node:20

  script:
    - export VERCEL_TOKEN=$VERCEL_TOKEN
    - export VERCEL_ORG_ID=$VERCEL_ORG_ID

  environment: staging
  tags:
    - shell-docker
  resource_group: lms-fe

# Job deploy staging cho LMS
deploy_staging_lms:
  extends: .deploy_staging_template
  only: 
    - staging
  script:
    - npm install -g vercel
    - export VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID
    - vercel deploy --prod --token=$VERCEL_TOKEN

# Job deploy staging cho Finhub
deploy_staging_finhub:
  extends: .deploy_staging_template
  only: 
    - staging
  script:
    - npm install -g vercel
    - export VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_FINHUB
    - vercel deploy --prod --token=$VERCEL_TOKEN

# =================== PRODUCTION ZONE =========================
# Prod environment
stages:
  - build
  - deploy

.prepare:
  variables:
    GIT_DEPTH: 10
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ''
  services:
    - name: docker:dind
      alias: docker_in_docker

variables:
  # IMAGE_BASE: "sappacademy/lms-be"

# Build template
.build_template:
  stage: build
  extends: .prepare
  image: docker:latest
  script:
    - cp $ENV_PRODUCT_FILE apps/$APP_NAME/.env
    - cp $ENV_PRODUCT_FILE .env
    - source .env
    - docker login -u $REGISTRY_USER --password $REGISTRY_PASSWORD
    - docker build --build-arg APP_NAME=$APP_NAME -t $IMAGE_NAME:$IMAGE_TAG .
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - echo "$IMAGE_NAME:$IMAGE_TAG build success"
  tags:
  - shell-docker
  environment: production
  resource_group: lms-fe

# # Build LMS-PRO
build_lms_pro:
