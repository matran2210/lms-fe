# Template chung cho deploy staging
.deploy_staging_template:
  stage: deploy
  image: node:20
  script:
    - export VERCEL_TOKEN=$VERCEL_TOKEN
    - export VERCEL_ORG_ID=$VERCEL_ORG_ID
  environment: staging
  tags:
    - shell-docker
  resource_group: lms-fe
  rules:
    - if: '$CI_COMMIT_BRANCH == "staging"'
      changes:
        - apps/$APP_NAME/**/*
        - libs/**/*
        - features/**/*
        - tools/**/*
        - scripts/**/*
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - turbo.json
        - tsconfig.json
        - .babelrc
        - .npmrc
        - .dockerignore
        - prod.Dockerfile
        - .gitlab-ci.yml

# Job deploy staging cho LMS
deploy_staging_lms:
  extends: .deploy_staging_template
  variables:
    APP_NAME: lms-pro
  script:
    - npm install -g vercel
    - export VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID
    - vercel deploy --prod --token=$VERCEL_TOKEN

# Job deploy staging cho Lms-finhub
deploy_staging_finhub:
  extends: .deploy_staging_template
  variables:
    APP_NAME: lms-finhub
  script:
    - npm install -g vercel
    - export VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_FINHUB
    - vercel deploy --prod --token=$VERCEL_TOKEN

# Job deploy staging cho Lms-zoom
deploy_staging_zoom:
  extends: .deploy_staging_template
  variables:
    APP_NAME: lms-zoom
  script:
    - npm install -g vercel
    - export VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_ZOOM
    - vercel deploy --prod --token=$VERCEL_TOKEN

# =================== PRODUCTION ZONE =========================
# Prod environment
stages:
  - build
  - deploy

.prepare:
  variables:
    GIT_DEPTH: 10
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ''
  services:
    - name: docker:dind
      alias: docker_in_docker

variables:
  # IMAGE_BASE: "sappacademy/lms-be"

# Build template
.build_template:
  stage: build
  extends: .prepare
  image: docker:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - apps/$APP_NAME/**/*
        - libs/**/*
        - features/**/*
        - tools/**/*
        - scripts/**/*
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - turbo.json
        - tsconfig.json
        - .babelrc
        - .npmrc
        - .dockerignore
        - prod.Dockerfile
  script:
    - cp $ENV_FILE apps/$APP_NAME/.env
    - cp $ENV_FILE .env
    - source .env

    - docker login -u $REGISTRY_USER --password $REGISTRY_PASSWORD
    - |
      docker build \
        --build-arg APP_NAME=$APP_NAME \
        -f prod.Dockerfile \
        -t $IMAGE_NAME:$IMAGE_TAG .

    - docker push $IMAGE_NAME:$IMAGE_TAG
    - echo "$IMAGE_NAME:$IMAGE_TAG build success"
  tags:
  - shell-docker
  environment: production
  resource_group: lms-fe

# Build lms-pro
build_lms_pro:
  extends: .build_template
  variables:
    APP_NAME: lms-pro
    IMAGE_TAG: lms-pro-$CI_PIPELINE_IID
    ENV_FILE: $ENV_PROD_LMS_FILE
  # only:
  #   # variables:
  #   #   - $CI_COMMIT_MESSAGE =~ /build/
  #   refs:
  #     - master

# Build lms-finhub
build_lms_finhub:
  extends: .build_template
  variables:
    APP_NAME: lms-finhub
    IMAGE_TAG: lms-finhub-$CI_PIPELINE_IID
    ENV_FILE: $ENV_PROD_FINHUB_FILE

# Build lms-zoom
build_lms_zoom:
  extends: .build_template
  variables:
    APP_NAME: lms-zoom
    IMAGE_TAG: lms-zoom-$CI_PIPELINE_IID
    ENV_FILE: $ENV_PROD_ZOOM_FILE

# Build lms-test
build_lms_test:
  extends: .build_template
  variables:
    APP_NAME: lms-test
    IMAGE_TAG: lms-test-$CI_PIPELINE_IID
    ENV_FILE: $ENV_PROD_LMS_MOCK_TEST_FILE


# Deploy
.deploy_template:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  script:
    - chmod 600 "$SSH_KEY_FILE"
    - cp "$SSH_KEY_FILE" key.pem
    - cp $RUNTIME_ENV_FILE .env
    - source .env

    - export TARGET_IP=$(eval echo "\$$TARGET_IP_VAR")
    - export IMAGE_TAG="${APP_NAME}-${CI_PIPELINE_IID}"
    - export IMAGE="${IMAGE_NAME}:${IMAGE_TAG}"

    - |
      ssh -o StrictHostKeyChecking=no -i key.pem root@$TARGET_IP "
        docker login -u $REGISTRY_USER --password $REGISTRY_PASSWORD &&
        cd /var/www/lms-fe &&
        git fetch origin --prune &&
        git reset --hard origin/master &&
        export ${IMAGE_ENV}='${IMAGE}' &&
        docker compose pull &&
        docker compose --profile ${PROFILE} up -d
      "
  environment: production
  tags:
  - shell
  resource_group: lms-fe

# Deploy lms-pro
deploy_lms_pro:
  extends: .deploy_template
  needs: ["build_lms_pro"]
  variables:
    APP_NAME: lms-pro
    PROFILE: lms-pro
    IMAGE_ENV: LMS_PRO_IMAGE
    TARGET_IP_VAR: PROD_LMS_IP
    SSH_KEY_FILE: $SSH_KEY_PROD_LMS
    RUNTIME_ENV_FILE: $ENV_PROD_LMS_FILE

# Deploy lms-finhub
deploy_lms_finhub:
  extends: .deploy_template
  needs: ["build_lms_finhub"]
  variables:
    APP_NAME: lms-finhub
    PROFILE: lms-finhub
    IMAGE_ENV: LMS_FINHUB_IMAGE
    TARGET_IP_VAR: PROD_FINHUB_IP
    SSH_KEY_FILE: $SSH_KEY_PROD_FINHUB
    RUNTIME_ENV_FILE: $ENV_PROD_FINHUB_FILE

# Deploy lms-zoom
deploy_lms_zoom:
  extends: .deploy_template
  needs: ["build_lms_zoom"]
  variables:
    APP_NAME: lms-zoom
    PROFILE: lms-zoom
    IMAGE_ENV: LMS_ZOOM_IMAGE
    TARGET_IP_VAR: PROD_ZOOM_IP
    SSH_KEY_FILE: $SSH_KEY_PROD_ZOOM
    RUNTIME_ENV_FILE: $ENV_PROD_ZOOM_FILE

# Deploy lms-test
deploy_lms_test:
  extends: .deploy_template
  needs: ["build_lms_test"]
  variables:
    APP_NAME: lms-test
    PROFILE: lms-test
    IMAGE_ENV: LMS_TEST_IMAGE
    TARGET_IP_VAR: PROD_LMS_MOCK_TEST_IP
    SSH_KEY_FILE: $SSH_KEY_PROD_LMS_MOCK_TEST
    RUNTIME_ENV_FILE: $ENV_PROD_LMS_MOCK_TEST_FILE