# New CI-CD
stages:
  - build
  - deploy

.prepare:
  variables:
    GIT_DEPTH: 10
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  services:
    - name: docker:dind
      alias: docker_in_docker
  

build_master:
  stage: build
  extends: .prepare
  only:
    # variables:
    #   - $CI_COMMIT_MESSAGE =~ /build/
    refs:
      - hotfix/SAPP-2170/update-CI-CD
  script:
    - cp $ENV_PRODUCT_FILE .env
    - source .env
    - docker login -u $REGISTRY_USER -password $REGISTRY_PASSWORD
    - docker build -t $IMAGE_NAME:lms-fe-$CI_PIPELINE_IID -f prod.Dockerfile .
    - docker push $IMAGE_NAME:lms-fe-$CI_PIPELINE_IID
    - echo "$IMAGE_NAME:lms-fe-$CI_PIPELINE_IID build success"
    - echo "IMAGE_PRODUCT_LMS_FE=$IMAGE_NAME:lms-fe-$CI_PIPELINE_IID" > /home/gitlab-runner/image_version.txt
  environment: production
  tags:
    - shell-docker-lms


deploy_staging:
  stage: deploy
  image: node:18
  only:
    - staging
  script:
    - yarn global add vercel
    - yarn install
    - vercel deploy --prod --token=$VERCEL_TOKEN
  environment: staging

deploy_master:
  stage: deploy
  extends: .prepare
  before_script:
    - chmod 400 $SSH_KEY
  only:
    # variables:
    #   - $CI_COMMIT_MESSAGE =~ /deploy/
    refs:
      - hotfix/SAPP-2170/update-CI-CD
  script:
    - docker login -u $REGISTRY_USER -password $REGISTRY_PASSWORD
    - |
      ssh -o StrictHostKeyChecking=no -i $SSH_KEY root@$PROD_IP "
      echo $IMAGE_PRODUCT_LMS_FE_LATEST &&
      docker login -u $REGISTRY_USER -p $REGISTRY_PASSWORD &&
      cd /var/www/lms-fe &&
      git reset --hard origin/master &&
      sed -i '/^\s*next-app\s*:/,/^ *[^[:space:]]/ s@^\(\s*image\s*:\s*\)[^[:space:]]*@\1"$IMAGE_NAME:lms-fe-$CI_PIPELINE_IID"@' docker-compose.prod.yml &&
      docker compose -f docker-compose.prod.yml pull next-app"

  environment: production 
  tags:
    - shell-docker-lms

