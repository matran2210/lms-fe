# Template chung cho deploy staging
.deploy_staging_template:
  stage: deploy
  image: node:20

  script:
    - export VERCEL_TOKEN=$VERCEL_TOKEN
    - export VERCEL_ORG_ID=$VERCEL_ORG_ID

  environment: staging
  tags:
    - shell-docker
  resource_group: lms-fe

# Job deploy staging cho LMS
deploy_staging_lms:
  extends: .deploy_staging_template
  only: 
    - staging
  script:
    - npm install -g vercel
    - export VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID
    - vercel deploy --prod --token=$VERCEL_TOKEN

# Job deploy staging cho Lms-finhub
deploy_staging_finhub:
  extends: .deploy_staging_template
  only: 
    - staging
  script:
    - npm install -g vercel
    - export VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_FINHUB
    - vercel deploy --prod --token=$VERCEL_TOKEN

# Job deploy staging cho Lms-zoom
deploy_staging_zoom:
  extends: .deploy_staging_template
  only: 
    - staging
  script:
    - npm install -g vercel
    - export VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_ZOOM
    - vercel deploy --prod --token=$VERCEL_TOKEN

# =================== PRODUCTION ZONE =========================
# Prod environment
stages:
  - build
  - deploy

.prepare:
  variables:
    GIT_DEPTH: 10
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ''
  services:
    - name: docker:dind
      alias: docker_in_docker

variables:
  # IMAGE_BASE: "sappacademy/lms-be"

# Build template
.build_template:
  stage: build
  extends: .prepare
  image: docker:latest
  script:
    - cp $TEST_ENV_PRODUCT_FILE apps/$APP_NAME/.env
    - cp $TEST_ENV_PRODUCT_FILE .env
    - source .env
    - docker login -u $REGISTRY_USER --password $REGISTRY_PASSWORD
    - docker build --build-arg APP_NAME=$APP_NAME -t $IMAGE_NAME:$IMAGE_TAG -f prod.Dockerfile .
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - echo "$IMAGE_NAME:$IMAGE_TAG build success"
  tags:
  - shell-docker
  environment: production
  resource_group: lms-fe

build_apps:
  extends: .build_template
  parallel:
    matrix:
      - APP_NAME: lms-pro
        IMAGE_TAG: lms-pro-$CI_PIPELINE_IID
        APP_PATH: apps/lms-pro/**/*
      - APP_NAME: lms-finhub
        IMAGE_TAG: lms-finhub-$CI_PIPELINE_IID
        APP_PATH: apps/lms-finhub/**/*
      - APP_NAME: lms-zoom
        IMAGE_TAG: lms-zoom-$CI_PIPELINE_IID
        APP_PATH: apps/lms-zoom/**/*
  rules:
    - if: '$CI_COMMIT_BRANCH == "master-test-build"'
      changes:
        - apps/lms-pro/**/*
        - libs/**/*
        - features/**/*
        - tools/**/*
        - scripts/**/*
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - turbo.json
        - tsconfig.json
        - .babelrc
        - .npmrc
        - .dockerignore
        - Dockerfile

# Deploy
deploy_prod:
  stage: deploy
  parallel:
    matrix:
      - APP_NAME: lms-pro
        PROFILE: lms-pro
        IMAGE_ENV: LMS_PRO_IMAGE
      - APP_NAME: lms-finhub
        PROFILE: lms-finhub
        IMAGE_ENV: LMS_FINHUB_IMAGE
      - APP_NAME: lms-zoom
        PROFILE: lms-zoom
        IMAGE_ENV: LMS_ZOOM_IMAGE
  rules:
    - if: '$CI_COMMIT_BRANCH == "master-test-build"'
  script:
    - chmod 600 "$TEST_SSH_KEY_PROD"
    - cp "$TEST_SSH_KEY_PROD" key.pem
    - cp $TEST_ENV_PRODUCT_FILE .env
    - source .env
    - export IMAGE_TAG="${APP_NAME}-${CI_PIPELINE_IID}"
    - export IMAGE="${IMAGE_NAME}:${IMAGE_TAG}"

    - |
      ssh -o StrictHostKeyChecking=no -i key.pem root@$TEST_PROD_IP "
        docker login -u $REGISTRY_USER --password $REGISTRY_PASSWORD &&
        cd /var/www/lms-fe &&
        git fetch origin --prune &&
        git reset --hard origin/master-test-build &&
        export ${IMAGE_ENV}='${IMAGE}' &&
        docker compose pull &&
        docker compose --profile ${PROFILE} up -d
      "
  environment: production
  tags:
    - shell
  resource_group: lms-fe


