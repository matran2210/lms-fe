# New CI-CD
stages:
  - build
  - deploy

.prepare:
  variables:
    GIT_DEPTH: 10
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ''
  services:
    - name: docker:dind
      alias: docker_in_docker

build_master:
  stage: build
  extends: .prepare
  only:
    # variables:
    #   - $CI_COMMIT_MESSAGE =~ /build/
    refs:
      - master
  script:
    - cp $ENV_PRODUCT_FILE .env
    - source .env
    - docker login -u $REGISTRY_USER --password $REGISTRY_PASSWORD
    - docker build -t $IMAGE_NAME:lms-fe-$CI_PIPELINE_IID -f prod.Dockerfile .
    - docker push $IMAGE_NAME:lms-fe-$CI_PIPELINE_IID
    - echo "$IMAGE_NAME:lms-fe-$CI_PIPELINE_IID build success"
  environment: production
  tags:
    - shell-docker
  resource_group: lms-fe

deploy_staging:
  stage: deploy
  image: node:18
  only:
    - staging
  script:
    - yarn global add vercel
    - yarn install
    - vercel deploy --prod --token=$VERCEL_TOKEN
  environment: staging
  tags:
    - shell-docker
  resource_group: lms-fe

deploy_master:
  stage: deploy
  only:
    # variables:
    #   - $CI_COMMIT_MESSAGE =~ /deploy/
    refs:
      - master
  script:
    - cp $ENV_PRODUCT_FILE .env
    - source .env
    - |
      ssh -o StrictHostKeyChecking=no root@$PROD_IP "
      docker login -u $REGISTRY_USER --password $REGISTRY_PASSWORD &&
      cd /var/www/lms-fe &&
      git fetch origin --prune &&
      git reset --hard origin/master &&
      sed -i '/^\s*next-app\s*:/,/^ *[^[:space:]]/ s@^\(\s*image\s*:\s*\)[^[:space:]]*@\1"$IMAGE_NAME:lms-fe-$CI_PIPELINE_IID"@' docker-compose.prod.yml &&
      docker compose -f docker-compose.prod.yml pull next-app && 
      docker compose -f docker-compose.prod.yml up -d"

  environment: production
  tags:
    - shell
  resource_group: lms-fe
