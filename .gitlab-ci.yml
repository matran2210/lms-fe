stages:
  - build
  - deploy

default:
  image: node:16.17.0-alpine

build_master:
  stage: build
  before_script:
    - docker info
  only:
    variables:
      - $CI_COMMIT_MESSAGE =~ /build/
    refs:
      - master
  script:
    - cp $ENV_PRODUCT_FILE .env
    - docker login -u $REGISTRY_USER -p $REGISTRY_PASSWORD $REGISTRY
    - docker build -t gitlab.sapp.edu.vn:5050/lms-pro/lms-fe/lms-fe-next:$CI_PIPELINE_IID -f prod.Dockerfile .
    - docker push gitlab.sapp.edu.vn:5050/lms-pro/lms-fe/lms-fe-next:$CI_PIPELINE_IID
    - echo "IMAGE_PRODUCT_LMS_FE=gitlab.sapp.edu.vn:5050/lms-pro/lms-fe/lms-fe-next:$CI_PIPELINE_IID" > /home/gitlab-runner/image_version.txt
  environment: production
  tags:
    - exec-shell
    

deploy_staging:
  stage: deploy
  only:
    - staging
  script:
    - yarn global add vercel
    - yarn install
    - vercel deploy --prod --token=$VERCEL_TOKEN
  environment: staging


deploy_master:
  stage: deploy
  before_script:
    - chmod 400 $SSH_KEY
  only:
    variables:
      - $CI_COMMIT_MESSAGE =~ /deploy/
    refs:
      - master
  script:
    - ssh -o StrictHostKeyChecking=no -i $SSH_KEY root@$PROD_IP "
      cd /var/www/lms-fe &&
      git reset --hard origin/master &&
      sed -i '/^\s*next-app\s*:/,/^ *[^[:space:]]/ s@^\(\s*image\s*:\s*\)[^[:space:]]*@\1"gitlab.sapp.edu.vn:5050/lms-pro/lms-fe/lms-fe-next:$CI_PIPELINE_IID"@' docker-compose.prod.yml &&
      docker compose -f docker-compose.prod.yml stop &&
      docker compose -f docker-compose.prod.yml rm -f &&
      docker compose -f docker-compose.prod.yml pull next-app &&
      docker compose -f docker-compose.prod.yml up -d"
  environment: production 
  tags:
    - exec-shell