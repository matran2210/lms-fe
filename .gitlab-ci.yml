# Deploy LMS-PRO
deploy_lms_pro:
  stage: deploy
  # needs:
  #   - build_lms_pro
  rules:
    - if: '$CI_COMMIT_BRANCH == "master-test-build"'
  script:
    - chmod 600 "$TEST_SSH_KEY_PROD"
    - cp "$TEST_SSH_KEY_PROD" key.pem
    - cp $ENV_PRODUCT_FILE .env
    - source .env

    - export IMAGE_TAG="lms-fe-${CI_PIPELINE_IID}"
    - export LMS_PRO_IMAGE="${IMAGE_NAME}:${IMAGE_TAG}"

    - |
      ssh -o StrictHostKeyChecking=no -i key.pem root@$TEST_PROD_IP "
        docker login -u $REGISTRY_USER --password $REGISTRY_PASSWORD &&
        cd /var/www/lms-fe &&
        git fetch origin --prune &&
        git reset --hard origin/master-test-build &&
        export LMS_PRO_IMAGE='${LMS_PRO_IMAGE}' &&
        docker compose stop lms-pro &&
        docker compose -f docker-compose.yaml pull lms-pro && 
        docker compose -f docker-compose.yaml up -d lms-pro nginx
      "
  environment: production
  tags:
  - shell
  resource_group: lms-fe

